<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

body {
  background: #f8f8f8;
}

.container {
  display: flex;
  min-height: 100vh;
}

/* LEFT SIDE */
.left {
  flex: 1;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h1 {
  font-size: 40px;
  letter-spacing: 5px;
}

h1 span {
  color: #e87c7c;
}

p {
  margin: 20px 0;
  color: #777;
}

/* FORM */
form {
  position: relative;
  margin-top: 20px;
}

input {
  padding: 15px;
  width: 280px;
  border-radius: 25px;
  border: 1px solid #ccc;
  outline: none;
}

button {
  position: absolute;
  right: 0;
  top: 0;
  height: 100%;
  padding: 0 20px;
  border: none;
  background: #e87c7c;
  color: white;
  border-radius: 25px;
  cursor: pointer;
}

button:hover {
  background: #d96b6b;
}

.error {
  color: red;
  font-size: 12px;
  display: none;
  margin-top: 5px;
}

/* RIGHT SIDE */
.right {
  flex: 1;
}

.right img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 📱 MOBILE */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .left {
    text-align: center;
    padding: 30px;
  }

  input {
    width: 100%;
  }
}
</style>

</head>
<body>

<div class="container">
  
  <div class="left">
    <h1>WE'RE <br><span>COMING SOON</span></h1>
    <p>Subscribe to get notified when we launch</p>

    <form id="form">
      <input type="email" id="email" placeholder="Email Address">
      <button>→</button>
      <div class="error">Please enter a valid email</div>
    </form>
  </div>

  <div class="right">
    <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e" alt="">
  </div>

</div>



</body>
</html>
